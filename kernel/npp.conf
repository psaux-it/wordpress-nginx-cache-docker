# Disable IP forwarding as this is a web server, not a router.
net.ipv4.ip_forward = 0

# Enable reverse path filtering for better security (prevents IP spoofing).
net.ipv4.conf.default.rp_filter = 1

# Disable accepting source route for security.
net.ipv4.conf.default.accept_source_route = 0

# Disable SysRq for security purposes.
kernel.sysrq = 0

# Enable TCP syncookies to mitigate SYN flood attacks.
net.ipv4.tcp_syncookies = 1

# Set message buffer limits (for IPC, useful for some backend processes).
kernel.msgmnb = 65536
kernel.msgmax = 65536

# Max size of a shared memory segment, useful if running a database or other memory-intensive services in the same container.
kernel.shmmax = 68719476736
kernel.shmall = 4294967296

# Reduce TIME_WAIT bucket limit for high traffic environments.
net.ipv4.tcp_max_tw_buckets = 6000

# Enable TCP SACK (Selective Acknowledgment) for better performance with packet loss.
net.ipv4.tcp_sack = 1

# Enable TCP window scaling (improves performance over high latency networks).
net.ipv4.tcp_window_scaling = 1

# Set the TCP read and write buffer sizes for optimal throughput in high-traffic environments.
net.ipv4.tcp_rmem = 4096 87380 4194304
net.ipv4.tcp_wmem = 4096 16384 4194304

# Set default and max socket buffer sizes for send/receive.
net.core.wmem_default = 8388608
net.core.rmem_default = 8388608
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Increase the maximum backlog of packets waiting to be processed.
net.core.netdev_max_backlog = 262144

# Increase the maximum number of pending connections in the listen queue.
net.core.somaxconn = 262144

# Allow more orphaned connections to be handled.
net.ipv4.tcp_max_orphans = 3276800

# Set max number of SYN packets waiting for acknowledgment to handle high traffic better.
net.ipv4.tcp_max_syn_backlog = 262144

# Disable TCP timestamping
net.ipv4.tcp_timestamps = 0

# Set low retry count for TCP connections for faster recovery from dropped connections.
net.ipv4.tcp_synack_retries = 1
net.ipv4.tcp_syn_retries = 1

# Reuse TCP connections in TIME_WAIT state to prevent exhausting system resources.
net.ipv4.tcp_tw_reuse = 1

# Set the time before TCP connections enter FIN_WAIT state.
net.ipv4.tcp_fin_timeout = 30

# Lower the time before sending TCP keepalive packets (useful for long-lived connections).
net.ipv4.tcp_keepalive_time = 30

# Set the range of local ports that can be used for outgoing connections.
net.ipv4.ip_local_port_range = 1024 65000

# Set the maximum number of connections that can be tracked for connection tracking.
net.ipv4.ip_conntrack_max = 6553500

# Enable low latency mode for TCP connections, reducing delays in transmission
net.ipv4.tcp_low_latency = 1
