####### DYNAMIC MODULES ########
load_module modules/ngx_http_cache_purge_module.so;
load_module modules/ngx_http_headers_more_filter_module.so;

####### GENERAL SETTINGS ########
user www-data www-data;
worker_processes auto;

####### EVENTS MODULE ########
events {
    use epoll;                             # Efficient event-driven model for Linux
    multi_accept on;                       # Accept multiple new connections at once
    worker_connections 1024;               # Max simultaneous connections per worker
}

####### HTTP MODULE ########
http {
    charset utf-8;                         # Default character encoding
    include /etc/nginx/mime.types;         # Load MIME types
    default_type application/octet-stream; # Default content type

    ####### PERFORMANCE & BUFFER SETTINGS ########
    fastcgi_buffer_size 512k;              # FastCGI buffer size
    fastcgi_busy_buffers_size 1024k;       # FastCGI busy buffer size
    fastcgi_buffers 16 512k;               # Number of FastCGI buffers

    server_names_hash_bucket_size 128;
    server_names_hash_max_size 2048;
    variables_hash_max_size 2048;

    ####### CLIENT TIMEOUT & REQUEST HANDLING ########
    client_header_timeout 3m;              # Timeout for client headers
    client_body_timeout 3m;                # Timeout for client body
    client_body_buffer_size 128k;          # Buffer size for client body
    client_max_body_size 256M;             # Max upload size (adjust as needed)
    send_timeout 10m;                      # Timeout for sending responses
    connection_pool_size 256;              # Connection pool size

    ####### HEADER & OUTPUT BUFFER SETTINGS ########
    client_header_buffer_size 3m;          # Buffer size for client headers
    large_client_header_buffers 4 256k;    # Buffer size for large headers
    request_pool_size 4k;                  # Request pool size
    output_buffers 1 32k;                  # Output buffer size
    postpone_output 1460;                  # Delay output to optimize performance

    ####### CONNECTION HANDLING ########
    sendfile on;                           # Enable sendfile for efficiency
    tcp_nopush on;                         # Optimize packet transmission
    tcp_nodelay on;                        # Reduce latency in small packets
    keepalive_timeout 30;                  # Keep connections open for 30s
    keepalive_requests 1000;               # Allow up to 1000 requests per connection

    ####### SECURITY & LOGGING ########
    ignore_invalid_headers on;             # Ignore malformed headers
    index index.html;                      # Default index file
    server_tokens off;                     # Hide Nginx version in responses
    reset_timedout_connection on;          # Close timed-out connections
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    ####### SSL SETTINGS ########
    ssl_protocols TLSv1.2 TLSv1.3;         # Enable secure TLS versions
    ssl_prefer_server_ciphers on;          # Prioritize server ciphers

    ####### FASTCGI SETTINGS ########
    fastcgi_read_timeout 60s;              # Timeout for FastCGI responses

    ####### GZIP COMPRESSION ########
    gzip on;                               # Enable gzip compression
    gzip_disable "msie6";                  # Disable gzip for old IE6 browsers
    gzip_proxied any;                      # Enable gzip for proxied requests
    gzip_vary on;                          # Add gzip Vary header
    gzip_types                             # File types to compress
        text/plain text/css
        application/x-javascript text/xml
        application/xml application/xml+rss
        text/javascript text/js
        application/json
        application/javascript;
    gzip_static on;                        # Use pre-compressed .gz files if available

    ######## CACHE SKIP MAPS ########

    # 1. Path-based exclusions
    # Source variable: $uri (decoded path only, no query string).
    map $uri $skip_cache_path {
        default 0;

        # WordPress core directories
        ~*/wp-(admin|content|includes|json)(?:/|$) 1;

        # WordPress root PHP files
        ~*/wp-[^/]*\.php 1;

        # XML-RPC endpoint
        ~/xmlrpc\.php 1;

        # WooCommerce transactional & account paths
        ~*/(cart|checkout|order-received|order-pay|wc-ajax|wc-auth|my-account|wc-api|addons)(?:/|$) 1;
        ~/wc/store(?:/|$) 1;

        # Authentication & registration paths
        ~*/(login|logout|register|lost-password|password-reset|activate)(?:/|$) 1;

        # Static system files
        ~/robots\.txt 1;

        # WordPress core sitemap and sitemap index
        ~/sitemap(_index)?\.xml 1;

        # Plugin-generated sitemaps  (e.g. /news-sitemap.xml)
        ~*/[a-z0-9_-]+-sitemap([0-9]+)?\.xml 1;

        # WordPress built-in sitemap (e.g. /wp-sitemap.xml)
        ~/wp-sitemap[^/]*\.xml 1;

        # oEmbed endpoint, CGI, and ACME challenge
        ~/embed/ 1;
        ~/cgi-bin/ 1;
        ~*\.well-known/ 1;
    }

    # 2. Query-string exclusions (dynamic actions)
    # Source variable: $query_string (query params only, no leading ?).
    # Pattern structure: (^|&)<param-name>= ensures we match whole param names,
    # not substrings inside values.
    map $query_string $skip_cache_query {
        default 0;
        ""      0;    # No query string → never skip from this map

        # WooCommerce cart & order actions
        ~*(?:^|&)(?:add-to-cart|added-to-cart|order_again|remove_item|undo_item|apply_coupon|remove_coupon|update_cart|empty_cart|download_file|pay_for_order|change_payment_method|wc-api|wc-ajax|add_to_wishlist|remove_from_wishlist|wc-authorize-wccom|productcheckout|cancel_order)= 1;

        # Faceted navigation / product-attribute filtering (dynamic prefixes)
        # Matches: attribute_pa_color=, filter_size=, query_type_color=, etc.
        ~*(?:^|&)(?:attribute_pa_|filter_|query_type_)[^=&]*= 1;

        # Price, rating & sort parameters (alter result set — must not cache)
        ~*(?:^|&)(?:rating_filter|min_price|max_price|orderby)= 1;

        # WordPress nonces, preview mode & Customizer
        ~*(?:^|&)(?:_wpnonce|preview|preview_id|preview_nonce|customize_changeset|wp_customize)= 1;

        # Search queries & manual cache bypass flags
        ~*(?:^|&)(?:_skip_cache|s|nocache)= 1;
    }

    # 3. Cookie-based exclusions
    # Skips cache for Wordpress + WoodMart.
    map $http_cookie $skip_cache_cookie {
        default 0;
        ~*(comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in) 1;

        # WoodMart — support
        ~*woodmart_wishlist_count=[1-9] 1;
        ~*woodmart_compare_list=%5B%22 1;
    }

    # Skips cache for WooCommerce.
    map $cookie_woocommerce_items_in_cart $skip_cache_cart {
        default 0;
        "1"     1;
    }

    # 4. AJAX-based exclusions
    # Do not cache AJAX / XHR requests
    map $http_x_requested_with $skip_cache_xhr {
        default        0;
        XMLHttpRequest 1;
    }

    ####### LOAD ADDITIONAL CONFIGURATION ########
    include /etc/nginx/conf.d/*.conf;      # Load virtual hosts & extra settings
}
