# Nginx VHOST for NPP-Optimized WordPress Setup                                    #
# ----------------------------------------------------------------------------     #
# Author: [Hasan ÇALIŞIR]                                                          #
# Purpose: Full-stack Dockerized environment for NPP WordPress plugin, including   #
#          WordPress, PHP-FPM, Nginx, MySQL, WP-CLI, and necessary PHP extensions. #
# ----------------------------------------------------------------------------     #

# FastCGI Cache Path
#####################
fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=NPP:100m max_size=1g inactive=30d;
#####################

# Nginx Temp Paths
#####################
# Prevents ngx_cache_purge purge_all from deleting
# in-flight temporary files (see ngx_cache_purge PR #66).
# Docker build defaults /var/cache/nginx and we have same path 
# used as cache zone cause this issue.
fastcgi_temp_path     /dev/shm/fastcgi_temp 1 2;
proxy_temp_path       /dev/shm/proxy_temp 1 2;
uwsgi_temp_path       /dev/shm/uwsgi_temp 1 2;
scgi_temp_path        /dev/shm/scgi_temp 1 2;
client_body_temp_path /dev/shm/client_temp 1 2;
#####################

server {
    # Listen HTTP
    #################
    listen 80;
    server_name localhost;

    # HTTPS Redirect
    #################
    location / {
        rewrite ^ https://$host$request_uri? permanent;
    }
}

server {
    # Listen HTTPS
    #################
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # phpMyAdmin Reverse Proxy
    #################
    location = /phpmyadmin {
        return 301 $scheme://$host/phpmyadmin/;
    }

    location ~ ^/phpmyadmin/ {
        rewrite ^/phpmyadmin(/.*)$ $1 break;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-For    $remote_addr;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_pass       http://phpmyadmin:80;
    }
    # End
    #####

    # WP Document root
    #################
    root /var/www/html;
    index index.php index.html index.htm;

    # FCGI Cache Settings
    #################
    set $skip_cache 0;
    if ($request_method = POST)   { set $skip_cache 1; }
    if ($request_method = DELETE) { set $skip_cache 1; }
    if ($request_method = PUT)    { set $skip_cache 1; }
    if ($request_method = PATCH)  { set $skip_cache 1; }

    # Five maps defined in nginx.conf (http context) resolve all cache
    # exclusion logic. We don't use:
    #
    #    if ($query_string != "") { set $skip_cache 1; }
    #
    # Instead, query string cache exclusions are controlled through optimised map:
    #
    #   $skip_cache_path   — path-based exclusions    (keyed on $uri)
    #   $skip_cache_query  — query-param exclusions   (keyed on $query_string)
    #   $skip_cache_cookie — cookie-based exclusions  (keyed on $http_cookie)
    #   $skip_cache_cart   — wc-cart exclusions       (keyed on $cookie_woocommerce_items_in_cart)
    #   $skip_cache_xhr    — ajax-based exclusions    (keyed on $http_x_requested_with)
    #
    # This approach allows higher level Nginx cache ratios for WooCommerce.
    #
    if ($skip_cache_path)   { set $skip_cache 1; }
    if ($skip_cache_query)  { set $skip_cache 1; }
    if ($skip_cache_cookie) { set $skip_cache 1; }
    if ($skip_cache_cart)   { set $skip_cache 1; }
    if ($skip_cache_xhr)    { set $skip_cache 1; }
    # End
    #####

    # Stop Nginx from logging
    #################
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
        allow all;
    }
    # End
    #####

    # Serve WP content
    #################
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
    # End
    #####

    # Protect NPP runtime files
    #################
    location ^~ /wp-content/uploads/nginx-cache-purge-preload-runtime/ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # End
    #####

    # HTTP Purge - Single
    #################
    location ~ ^/purge(/.*) {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny  all;
        fastcgi_cache_purge NPP "$scheme$request_method$host$1";
    }
    # End
    #####

    # HTTP Purge - All
    #################
    location = /purge_all {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny  all;

        fastcgi_cache       NPP;
        fastcgi_cache_key   "$scheme$request_method$host$request_uri";
        fastcgi_cache_purge GET purge_all from all;
    }
    # End
    #####

    # WP PHP-FPM PASS
    #################
    location ~ \.php$ {
        # Use NPP "Cache Key Regex" option for non-default structers
        ############################################################
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        ############################################################

        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_index index.php;
        fastcgi_pass wordpress-fpm:9001;
        include /etc/nginx/fastcgi_params;

        limit_req           zone=nppp_api burst=5 nodelay;   # Apply rate limit; allow burst of 5 with no queuing delay
        limit_req_status    429;                             # Return 429 Too Many Requests instead of default 503
        limit_req_log_level warn;                            # Log rate limit hits as warnings, not errors

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache NPP;
        fastcgi_cache_valid 200 30d;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_use_stale error timeout updating http_500 http_503;
        fastcgi_cache_lock on;
        fastcgi_cache_background_update on;

        # Prevent cookie leakage: remove Set-Cookie headers from cacheable responses
        # so that one user's cookies are never served to another user from cache.
        if ($skip_cache = 0) {
            more_clear_headers "Set-Cookie*";
        }

        # Prevents Nginx from splitting cache into multiple variants per URL.
        # When PHP-FPM sends "Vary: Accept-Encoding", Nginx computes a secondary MD5 key
        # from the request Accept-Encoding header and stores separate cache files per
        # encoding variant. This causes NPP cache preload to warm a different
        # variant than real browsers hit, resulting in cache MISS for visitors.
        # This directive tells Nginx to ignore the upstream Vary header entirely,
        # enforcing a single cache entry per URL regardless of client Accept-Encoding.
        # Gzip/Brotli compression is unaffected — Nginx still compresses responses
        # on-the-fly at the output filter layer, after cache storage.
        ############################################################
        fastcgi_ignore_headers Vary;
        ############################################################
    }
    # End
    #####

    # WP Security Settings (Enable on Production)
    #################
    # Deny access to hidden files and directories (except .well-known)
    # location ~ /\.(?!well-known/) {
    #     deny all;
    # }

    # Deny access to wp-config files and other critical files
    # location ~* ^/(?:wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt)$ {
    #     deny all;
    # }

    # Deny access to PHP files in uploads, files, plugins, themes
    # location ~* /(?:uploads|files|wp-content|wp-includes)/.*\.php$ {
    #     deny all;
    # }

    # Deny access to script file types
    # location ~* .(pl|cgi|py|sh|lua|asp)$ {
    #     deny all;
    # }

    # Block access to wp-content plugin/theme log files
    # location ~* ^/wp-content/(plugins|themes)/.*\.(txt|log|md)$ {
    #     deny all;
    # }

    # Block common attack patterns
    # location ~* "(eval\(.*\)|base64_encode\(.*\)|\{0\}|phpinfo|self/environ)" {
    #     deny all;
    # }

    # Block dangerous file access
    # location ~* "/(thumb|timthumb|config|settings|sqlpatch|webshell|phpinfo)\.php" {
    #     deny all;
    # }
    # End
    #####

    # Browser Cache (Enable on Production)
    #################
    # location ~*.(ogg|ogv|svg|svgz|eot|otf|woff|mp4|ttf|css|rss|atom|js|jpg|jpeg|gif|png|ico|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf)$ {
    #    expires max;
    #    log_not_found off;
    #    access_log off;
    # }
    # End
    #####

    # Dummy Self-Signed SSL Certificate (Don't use on Production)
    #################
    ssl_certificate /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/privkey.pem;
    ssl_trusted_certificate /etc/ssl/chain.pem;
    # End
    #####

    # SSL Settings (Enable on Production)
    #################
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES256-SHA:ECDHE-ECDSA-DES-CBC3-SHA:ECDHE-RSA-DES-CBC3-SHA:EDH-RSA-DES-CBC3-SHA:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA:!DSS;
    # ssl_ecdh_curve secp384r1;
    # ssl_session_cache shared:SSLA:10m;
    # ssl_session_timeout 10m;
    # ssl_session_tickets off;
    # ssl_buffer_size 4k;
    # End
    #####

    # Security Headers (Enable on Production)
    #################
    # add_header Content-Security-Policy upgrade-insecure-requests;
    # add_header Permissions-Policy "microphone=(), camera=(), interest-cohort=(), browsing-topics=()";
    # add_header Referrer-Policy no-referrer-when-downgrade;
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-Content-Type-Options "nosniff";
    # add_header X-XSS-Protection "1; mode=block";
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # End
    #####

    # FastCGI Cache Status Header
    #################
    add_header NPP-FastCGI-Cache $upstream_cache_status always;
    #################
}
